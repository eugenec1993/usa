name: WC Ticket Alert

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ticket-alert
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scraper
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          PRICE_LIMIT: ${{ vars.PRICE_LIMIT }}
          MIN_QTY:     ${{ vars.MIN_QTY }}
          SECTION_MIN: ${{ vars.SECTION_MIN }}
          SECTION_MAX: ${{ vars.SECTION_MAX }}
        run: python scrape.py

      - name: Save state
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "ticket-bot"
            git config user.email "bot@users.noreply.github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          fi

      - name: Upload debug screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug-*.png
          if-no-files-found: ignore
